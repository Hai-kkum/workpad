name: Build

# main 푸시 + 수동 실행 시 Windows 설치 프로그램(NSIS setup) + 포터블(.exe)을 빌드해 아티팩트로 올린다.
# 서명은 아직 없음(미서명 빌드) — 인증서 결정 후 별도 단계로 추가 예정.
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer + portable exe
        run: npm run dist

      - name: Upload Windows artifacts (setup + portable)
        uses: actions/upload-artifact@v4
        with:
          name: Workpad-windows
          path: dist/*.exe
          if-no-files-found: error

      # 태그(v*) 푸시 시에만 포터블을 GitHub Release에 첨부
      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
