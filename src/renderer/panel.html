<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div class="head" id="phead">
    <span class="brand"><img src="../../assets/brand/workpad-mark.svg" alt="" /><span class="logo">Workpad</span></span><span class="ver">v…</span>
    <span class="hspace"></span>
    <button class="pbtn" id="pPin" title="항상 위 (다른 창 위에 고정)"></button>
    <button class="pbtn" id="pFold" title="접기/펼치기 (헤더 더블클릭)"></button>
    <button class="pbtn" id="pMin" title="최소화 (작업표시줄로)"></button>
    <button class="pbtn" id="pClose" title="닫기(종료)">✕</button>
  </div>

  <div class="content" id="content">
    <div class="sec" style="border-top:none;"><div class="row search-row"><input id="search" placeholder="전체 검색 (Ctrl+K)" /><button id="searchClear" class="searchclear" title="지우기 (Esc)" hidden>✕</button></div></div>

    <!-- 카드: 추가 + 섹션 필터 + 목록 + 전체 표시/숨김을 한 블록으로 통합 -->
    <div class="sec">
      <div class="sechead">
        <span class="lbl">카드</span>
        <span class="mini">
          <button id="toggleAll" class="vistoggle">전체 표시/숨김</button>
        </span>
      </div>
      <div class="addline">
        <div class="btns add primary-add">
          <button data-type="note">+ 노트</button>
          <button data-type="memo">+ 메모</button>
          <button data-type="table">+ 표</button>
        </div>
        <button id="uploadNote" class="uploadbtn">파일 업로드</button>
      </div>
      <div class="hint uploadhint" id="uploadHint"></div>
      <div class="tabs" id="tabs"></div>
      <div class="cards" id="cards"></div>
    </div>

    <div class="sec">
      <div class="sechead">
        <span class="lbl">배치 프리셋</span>
        <span class="mini"><button id="presetDeleteMode" title="프리셋 삭제 표시" hidden>-</button></span>
      </div>
      <div class="row layout-actions">
        <button id="autoArrange">자동 정렬</button>
        <button id="undoArrange" hidden>정렬 취소</button>
      </div>
      <div class="row">
        <input id="presetName" placeholder="프리셋 이름" />
        <button id="savePreset">저장</button>
      </div>
      <div class="presets" id="presets"></div>
    </div>

    <!-- 설정 · 백업: 자주 안 쓰는 항목은 접어둠(기본 닫힘) -->
    <div class="sec disc" id="moreToggle" role="button" tabindex="0">
      <span class="lbl">설정 · 백업</span><span class="arr">▾</span>
    </div>
    <div id="moreBody" hidden>
      <div class="sub">
        <div class="row"><label class="fld">사용자ID</label><input id="agentId" placeholder="예: 홍길동" /><button id="agentIdSave">적용</button></div>
        <div class="row"><label class="fld">말머리</label><input id="hdrInput" placeholder="머리말 추가 (예: 상담)" /><button id="hdrAdd">추가</button></div>
        <div class="hdrs" id="hdrList"></div>
        <div class="row"><label class="chk"><input type="checkbox" id="maskPII" /> 개인정보 가리기 (복사는 원문)</label></div>
        <div class="hint" id="hotkeyHint"></div>
      </div>

      <div class="sub" id="xferSec">
        <div class="lbl2">데이터 백업 · PC 이전</div>
        <div class="btns" id="xferBtns">
          <button id="exportBtn">내보내기</button>
          <button id="importBtn">가져오기</button>
        </div>
        <div id="xferForm"></div>
        <div class="hint" id="xferHint">암호로 백업해 새 PC에서 복원합니다.</div>
      </div>

      <div class="sub" id="lockSec">
        <div class="lbl2">비밀번호 잠금 (SE-9)</div>
        <div id="lockBody"></div>
        <div id="lockForm"></div>
        <div class="hint" id="lockHint">앱을 열 때 비밀번호로 잠급니다. 분실하면 데이터를 복구할 수 없으니 먼저 백업하세요.</div>
      </div>
    </div>

    <div class="status" id="status"></div>
    <div class="loadnote" id="loadnote" style="display:none"></div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
