<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:" />
  <link rel="stylesheet" href="card.css" />
</head>
<body>
  <div class="bar">
    <span class="title" id="title" spellcheck="false"></span>
    <button class="bbtn" id="rename" title="이름 변경"></button>
    <button class="bbtn" id="fmt" title="복사 서식">#</button>
    <button class="bbtn" id="reveal" title="개인정보 잠시 보기 (자동 가림·공개 시 워터마크)">👁</button>
    <button class="bbtn" id="pin" title="항상 위">위</button>
    <button class="bbtn" id="fold" title="접기">—</button>
    <button class="bbtn" id="close" title="숨기기 (삭제는 패널에서)">✕</button>
  </div>
  <div class="body" id="body"></div>
  <script src="../shared/pii.js"></script>
  <script src="card.js"></script>
</body>
</html>
